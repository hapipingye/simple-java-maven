# =============================================================================
# CI/CD Pipeline — simple-java-maven-app
#
# 触发条件：推送 & PR 到 main 分支
# 流水线：checkstyle → build-and-test (矩阵 JDK 21/22/23) → package → notify
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 取消同一 PR 上正在进行的前一次运行，避免资源浪费
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # -------------------------------------------------------------------
  # Job 1: checkstyle — 代码风格检查
  # -------------------------------------------------------------------
  checkstyle:
    name: "代码风格检查"
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'       # Eclipse Temurin (OpenJDK)
          cache: maven                   # 启用 Maven 依赖缓存

      - name: 执行 checkstyle 检查
        run: mvn checkstyle:check

  # -------------------------------------------------------------------
  # Job 2: build-and-test — 多 JDK 矩阵编译 + 测试
  # -------------------------------------------------------------------
  build-and-test:
    name: "JDK ${{ matrix.java }} 编译测试"
    needs: checkstyle                   # 必须先通过代码风格检查
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false                  # 某一版本失败不取消其他
      matrix:
        java: [ '21', '22', '23' ]     # 三版本并行

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven

      - name: 显示 Java 版本
        run: java -version

      - name: Maven 编译 + 测试
        run: mvn -B verify --file pom.xml

      # 上传测试报告（即使测试失败也上传，方便调试）
      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk-${{ matrix.java }}
          path: target/surefire-reports/
          retention-days: 7

  # -------------------------------------------------------------------
  # Job 3: package — 打包可执行 JAR
  # -------------------------------------------------------------------
  package:
    name: "打包 JAR"
    needs: build-and-test               # 全部 JDK 矩阵通过后才打包
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Maven 打包（跳过测试，因为已在上一步跑过）
        run: mvn -B package -DskipTests

      - name: 验证 JAR 可执行
        run: java -jar target/simple-java-maven-app-1.0-SNAPSHOT.jar

      # 上传最终制品
      - name: 上传 JAR 制品
        uses: actions/upload-artifact@v4
        with:
          name: simple-java-maven-app
          path: target/simple-java-maven-app-1.0-SNAPSHOT.jar
          retention-days: 30

  # -------------------------------------------------------------------
  # Job 4: notify — 流水线结果汇总通知
  # -------------------------------------------------------------------
  notify:
    name: "通知"
    needs: package
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 汇总流水线结果
        run: |
          echo "======================================="
          echo "  CI/CD Pipeline 执行完毕"
          echo "======================================="
          echo "  checkstyle:    ${{ needs.checkstyle.result }}"
          echo "  build-and-test: ${{ needs.build-and-test.result }}"
          echo "  package:       ${{ needs.package.result }}"
          echo "======================================="
